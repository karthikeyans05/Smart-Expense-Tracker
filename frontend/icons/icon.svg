<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1830"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9180ff"/>
      <stop offset="100%" stop-color="#7c6af7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Diamond icon ◈ -->
  <polygon points="256,100 356,200 256,300 156,200" fill="none" stroke="url(#accent)" stroke-width="18" stroke-linejoin="round"/>
  <polygon points="256,130 326,200 256,270 186,200" fill="url(#accent)" opacity="0.25"/>
  <!-- Accent dot -->
  <circle cx="256" cy="200" r="18" fill="url(#accent)"/>
  <!-- Bottom bar chart hint -->
  <rect x="156" y="340" width="40" height="72" rx="6" fill="url(#accent)" opacity="0.5"/>
  <rect x="216" y="310" width="40" height="102" rx="6" fill="url(#accent)" opacity="0.7"/>
  <rect x="276" y="360" width="40" height="52" rx="6" fill="url(#accent)" opacity="0.5"/>
  <rect x="336" y="330" width="40" height="82" rx="6" fill="url(#accent)" opacity="0.6"/>
</svg>
