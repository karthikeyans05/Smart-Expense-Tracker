# Application
spring.application.name=expense-tracker
server.port=${PORT:8080}

# ──────────────────────────────────────────────────────────────
# Database connection — two sources supported:
#
#  1. SPRING_DATASOURCE_URL / USERNAME / PASSWORD
#     Set these in Railway via the variable reference picker
#     (value example: ${{MySQL.MYSQLHOST}} etc.)
#
#  2. MYSQLHOST / MYSQLPORT / MYSQLDATABASE / MYSQLUSER / MYSQLPASSWORD
#     Injected automatically when the MySQL service is "connected"
#     to this service in the Railway dashboard.
#
# Falls back to localhost for local development.
# ──────────────────────────────────────────────────────────────
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:expense_tracker_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:root}}

# JPA / Hibernate — update creates tables if they don't exist
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# HikariCP — longer timeouts for Railway cold starts
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# Logging — INFO for hikari so DB connection errors are visible
logging.level.com.expensetracker=INFO
logging.level.org.springframework.web=WARN
logging.level.com.zaxxer.hikari=INFO

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd
