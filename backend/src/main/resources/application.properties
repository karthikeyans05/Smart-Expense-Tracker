# Application
spring.application.name=expense-tracker
server.port=${PORT:8080}

# ──────────────────────────────────────────────────────────────
# MySQL — Railway injects MYSQLHOST/PORT/USER/PASSWORD/DATABASE
# automatically when the MySQL plugin is connected to this service.
# Falls back to localhost for local development.
# ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:expense_tracker_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Give HikariCP more time to get a connection on cold starts
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# Logging
logging.level.com.expensetracker=INFO
logging.level.org.springframework.web=WARN
logging.level.com.zaxxer.hikari=INFO

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd
